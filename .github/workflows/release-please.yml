name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}

    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          # Use of `github.token` instead of `secrets.GITHUB_TOKEN` allows
          # checks to be run manually from the PR
          token: ${{ github.token }}
          release-type: node

  publish:
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.release_created == 'true'

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci

      - run: npm publish --access public --provenance
